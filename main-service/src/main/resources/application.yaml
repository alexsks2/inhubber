spring:
  application:
    name: main-service
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: inhubber
    password: inhubber
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

services:
  identity-url: http://localhost:8081
